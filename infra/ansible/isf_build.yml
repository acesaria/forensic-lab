# infra/ansible/isf_build.yml
- name: Volatility 3 ISF build
  hosts: all
  become: yes

  vars:
    isf_filename: "{{ ansible_distribution | lower }}_{{ ansible_kernel }}.json"
    local_isf_path: "{{ shared_isf_dir }}/{{ isf_filename }}"

  vars_files:
    - "vars/{{ ansible_distribution | lower }}.yml"

  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.shell: |
        if command -v cloud-init >/dev/null 2>&1; then
          cloud-init status --wait
        fi
      changed_when: false
      timeout: 300

    - name: Wait for dpkg lock to be released
      ansible.builtin.shell: |
        until ! fuser /var/lib/dpkg/lock* >/dev/null 2>&1; do
          sleep 2
        done
      changed_when: false
      timeout: 120

    - name: Check if ISF already exists locally
      ansible.builtin.stat:
        path: "{{ local_isf_path }}"
      register: local_isf
      delegate_to: localhost
      become: no

    - name: Skip if ISF already exists locally
      ansible.builtin.meta: end_play
      when: local_isf.stat.exists

    - name: Refresh APT cache
      ansible.builtin.apt:
        update_cache: yes

  tasks:
    - name: Install base dependencies
      ansible.builtin.apt:
        name: "{{ isf_base_packages }}"
        state: present

    # This includes the distro task which sets up repos, 
    # installs the package, and sets the 'debug_vmlinux_path' fact
    - name: Acquire kernel debug symbols
      ansible.builtin.include_tasks: "tasks/dbgsym_{{ ansible_distribution | lower }}.yml"

    - name: Check installed vmlinux path
      ansible.builtin.stat:
        path: "{{ debug_vmlinux_path }}"
      register: vmlinux_stat

    - name: Fail if vmlinux is missing
      ansible.builtin.fail:
        msg: "Expected vmlinux not found at {{ debug_vmlinux_path }}"
      when: not vmlinux_stat.stat.exists

    # --- dwarf2json build (once) ---
    
    - name: Clone dwarf2json
      ansible.builtin.git:
        repo: https://github.com/volatilityfoundation/dwarf2json.git
        dest: /opt/dwarf2json
        version: master
        update: yes

    - name: Build dwarf2json
      ansible.builtin.command:
        cmd: go build -o dwarf2json .
        chdir: /opt/dwarf2json
        creates: /opt/dwarf2json/dwarf2json

    # --- ISF generation + fetch ---
    
    - name: Generate ISF JSON to guest tmp
      ansible.builtin.shell: "/opt/dwarf2json/dwarf2json linux --elf {{ debug_vmlinux_path }} > /tmp/{{ isf_filename }}"

    - name: Ensure local ISF directory exists
      ansible.builtin.file:
        path: "{{ shared_isf_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: no

    - name: Fetch ISF to controller
      ansible.builtin.fetch:
        src: "/tmp/{{ isf_filename }}"
        dest: "{{ local_isf_path }}"
        flat: yes