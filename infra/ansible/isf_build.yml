# infra/ansible/isf_build.yml
- name: Volatility 3 ISF build
  hosts: all
  become: yes

  vars:
    kernel_version: "{{ ansible_kernel }}"
    isf_filename: "{{ ansible_distribution | lower }}_{{ ansible_kernel }}.json"
    local_isf_dir: "{{ shared_isf_dir }}"
    local_isf_path: "{{ local_isf_dir }}/{{ isf_filename }}"

  vars_files:
    - "vars/{{ ansible_distribution | lower }}.yml"

  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command:
        cmd: cloud-init status --wait
      changed_when: false
      timeout: 300

    - name: Wait for dpkg lock to be released
      ansible.builtin.shell: |
        until ! fuser /var/lib/dpkg/lock* > /dev/null 2>&1; do
          echo "Waiting for dpkg lock..."
          sleep 2
        done
      changed_when: false
      timeout: 120

    - name: Check if ISF JSON already exists on host
      ansible.builtin.stat:
        path: "{{ local_isf_path }}"
      register: host_isf
      delegate_to: localhost
      become: no

    - name: Skip ISF build when file already exists
      ansible.builtin.meta: end_play
      when: host_isf.stat.exists

    - name: Ensure Debian sources.list has main repos
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        content: |
          deb http://deb.debian.org/debian {{ ansible_distribution_release }} main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian {{ ansible_distribution_release }}-updates main contrib non-free non-free-firmware
      when: ansible_distribution == "Debian"

    - name: Update APT cache on Debian-based systems
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

  tasks:
    - name: Install base dependencies
      ansible.builtin.package:
        name: "{{ isf_base_packages }}"
        state: present
      register: pkg_install
      retries: 3
      delay: 5
      until: pkg_install is succeeded

    - name: Include debug symbols acquisition flow
      ansible.builtin.include_tasks: "tasks/dbgsym_{{ ansible_distribution | lower }}.yml"

    - name: Check debug kernel ELF exists
      ansible.builtin.stat:
        path: "{{ debug_vmlinux_path }}"
      register: debug_elf

    - name: Abort when debug symbols are missing
      ansible.builtin.fail:
        msg: "Missing debug symbols at {{ debug_vmlinux_path }}. Check dbgsym repo and package installation."
      when: not debug_elf.stat.exists

    - name: Check if dwarf2json is already built
      ansible.builtin.stat:
        path: /opt/dwarf2json/dwarf2json
      register: dwarf2json_binary

    - name: Clone dwarf2json source if not present
      ansible.builtin.git:
        repo: https://github.com/volatilityfoundation/dwarf2json.git
        dest: /opt/dwarf2json
        version: master
        update: yes
      when: not dwarf2json_binary.stat.exists

    - name: Build dwarf2json if not present
      ansible.builtin.command:
        cmd: go build -o dwarf2json .
        chdir: /opt/dwarf2json
      when: not dwarf2json_binary.stat.exists

    - name: Generate ISF JSON using dwarf2json
      ansible.builtin.command:
        cmd: "/opt/dwarf2json/dwarf2json linux --elf {{ debug_vmlinux_path }}"
      register: dwarf2json_output

    - name: Write ISF JSON to temporary file on guest
      ansible.builtin.copy:
        content: "{{ dwarf2json_output.stdout }}"
        dest: "/tmp/{{ isf_filename }}"

    - name: Ensure local shared ISF directory exists
      ansible.builtin.file:
        path: "{{ local_isf_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: no

    - name: Fetch ISF file to host shared/isf directory
      ansible.builtin.fetch:
        src: "/tmp/{{ isf_filename }}"
        dest: "{{ local_isf_path }}"
        flat: yes