- name: Install Ubuntu debug symbol keyring
  ansible.builtin.apt:
    name: ubuntu-dbgsym-keyring
    state: present

- name: Add Ubuntu ddebs repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ddebs.list
    content: |
      deb http://ddebs.ubuntu.com {{ ansible_distribution_release }} main restricted universe multiverse
      deb http://ddebs.ubuntu.com {{ ansible_distribution_release }}-updates main restricted universe multiverse
      deb http://ddebs.ubuntu.com {{ ansible_distribution_release }}-proposed main restricted universe multiverse
    mode: "0644"

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: yes

# Try the standard signed package first
- name: Install kernel debug symbols
  ansible.builtin.apt:
    name: "linux-image-{{ ansible_kernel }}-dbgsym"
    state: present
  ignore_errors: yes
  register: apt_dbgsym

# Fallback to unsigned if the signed one doesn't exist (common on Ubuntu)
- name: Install unsigned kernel debug symbols (fallback)
  ansible.builtin.apt:
    name: "linux-image-unsigned-{{ ansible_kernel }}-dbgsym"
    state: present
  when: apt_dbgsym.failed

- name: Set vmlinux path
  ansible.builtin.set_fact:
    debug_vmlinux_path: "/usr/lib/debug/boot/vmlinux-{{ ansible_kernel }}"