# infra/ansible/tasks/dbgsym_ubuntu.yml

- name: Check if debug kernel ELF is already present (Ubuntu)
  ansible.builtin.stat:
    path: "{{ debug_vmlinux_path }}"
  register: debug_elf_before

- name: Create temp directory for debug symbols (Ubuntu)
  ansible.builtin.file:
    path: /tmp/dbgsym
    state: directory
    mode: "0755"
  when: not debug_elf_before.stat.exists

- name: Download debug symbols with aria2c (Ubuntu)
  ansible.builtin.command: >
    aria2c
    --console-log-level=notice
    --summary-interval=10
    --max-connection-per-server=8
    --split=8
    --dir=/tmp/dbgsym
    --out=linux-dbgsym.ddeb
    {{ debug_pkg_url }}
  when: not debug_elf_before.stat.exists
  register: aria2c_download
  retries: 3
  delay: 10
  until: aria2c_download is succeeded

- name: Install debug symbols package (Ubuntu)
  ansible.builtin.command:
    cmd: "{{ debug_pkg_install_cmd }}"
  when: not debug_elf_before.stat.exists

- name: Clean up downloaded ddeb (Ubuntu)
  ansible.builtin.file:
    path: /tmp/dbgsym
    state: absent
  when: not debug_elf_before.stat.exists